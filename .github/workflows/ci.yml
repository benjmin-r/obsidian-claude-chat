name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Test (all workspaces, enforces coverage thresholds)
        run: npm test

      - name: Build (protocol + server + plugin)
        run: npm run build
